<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FameAI – Login</title>
  <link rel="stylesheet" href="create-agent.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="logo.png" alt="FameAI Logo" />
    </div>
    <a href="index.html" class="text-btn">Back to Home</a>
  </header>

  <main class="onboarding-container">
    <div class="card" style="max-width: 500px;">
      <h1 class="question" style="text-align: center;">Welcome</h1>
      
      <div class="input-area">
        <input type="email" id="email" placeholder="Email address" style="margin-bottom: 16px;" />
        <input type="password" id="password" placeholder="Password" style="margin-bottom: 16px;" />
        <button id="loginBtn" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Sign In</button>
        <button id="signupBtn" class="btn btn-secondary" style="width: 100%;">Create Account</button>
      </div>
      
      <p id="errorMsg" style="color: #ef4444; text-align: center; display: none; margin-top: 16px;"></p>
    </div>
  </main>

  <script type="module">
    import { signIn, signUp, saveUserData, onAuthChange } from './firebase-config.js';
    
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    loginBtn.addEventListener('click', async () => {
      try {
        await signIn(emailInput.value, passwordInput.value);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    });
    
    signupBtn.addEventListener('click', async () => {
      try {
        const userCredential = await signUp(emailInput.value, passwordInput.value);
        await saveUserData(userCredential.user.uid, userCredential.user.email);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    });
    
    onAuthChange((user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
