<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FameAI – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="create-agent.css" />
  
  <style>
    /* ===== LOGIN PAGE SPECIFIC STYLES ===== */
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 40px;
    }

    .login-card {
      background: rgba(18, 24, 40, 0.95);
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 
        0 0 0 1px rgba(100, 180, 255, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(100, 180, 255, 0.08);
      backdrop-filter: blur(16px);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 15px;
      color: #8ab4f8;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #8ab4f8;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(30, 38, 60, 0.9);
      border: 1.5px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #8ab4f8;
      box-shadow: 0 0 0 4px rgba(100, 180, 255, 0.15);
      background: rgba(30, 38, 60, 1);
    }

    .form-group input::placeholder {
      color: rgba(138, 180, 248, 0.5);
    }

    .btn-full {
      width: 100%;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #64b4ff, #8ab4f8);
      color: #0a0e17;
      box-shadow: 0 4px 20px rgba(100, 180, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(100, 180, 255, 0.45);
    }

    .btn-secondary {
      background: rgba(30, 38, 60, 0.9);
      color: #ffffff;
      border: 1.5px solid rgba(100, 180, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(100, 180, 255, 0.15);
      border-color: #8ab4f8;
      transform: translateY(-2px);
    }

    .btn-google {
      background: #ffffff;
      color: #1a1a1a;
      border: 1.5px solid rgba(100, 180, 255, 0.3);
      margin-top: 16px;
    }

    .btn-google:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: rgba(138, 180, 248, 0.5);
      font-size: 13px;
      font-weight: 500;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(100, 180, 255, 0.2);
    }

    .divider span {
      padding: 0 16px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1.5px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      animation: shake 0.4s ease;
    }

    .error-message.show {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1.5px solid rgba(16, 185, 129, 0.3);
      color: #10B981;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .success-message.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(100, 180, 255, 0.15);
    }

    .login-footer p {
      font-size: 14px;
      color: rgba(138, 180, 248, 0.7);
    }

    .login-footer a {
      color: #8ab4f8;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .login-footer a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .login-card {
        padding: 32px 24px;
        margin: 0 12px;
      }

      .login-title {
        font-size: 24px;
      }

      .login-container {
        padding: 100px 16px 32px;
      }
    }
  </style>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="logo" style="display: flex; align-items: center; gap: 12px;">
      <img src="logo.png" alt="FameAI Logo" style="height: 45px; width: auto;" />
      <span style="font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px;">FAMEAI</span>
    </div>
    <a href="index.html" class="text-btn" style="font-size: 15px; font-weight: 600;">← Back to Home</a>
  </header>

  <!-- ===== LOGIN CONTAINER ===== -->
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to access your AI agents</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <!-- Email/Password Form -->
      <div id="emailForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="you@example.com" 
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••" 
            autocomplete="current-password"
            required
          />
        </div>

        <button id="signInBtn" class="btn btn-primary btn-full">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        </button>

        <button id="signUpBtn" class="btn btn-secondary btn-full" style="margin-top: 12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Create Account
        </button>
      </div>

      <div class="divider">
        <span>OR CONTINUE WITH</span>
      </div>

      <!-- Google Sign In -->
      <button id="googleSignInBtn" class="btn btn-google btn-full">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="login-footer">
        <p>By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
      </div>
    </div>
  </main>

  <!-- ===== FIREBASE & LOGIC ===== -->
  <script type="module">
    import { auth, db, signIn, signUp, saveUserData } from './firebase-config.js';
    import { signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const signInBtn = document.getElementById('signInBtn');
    const signUpBtn = document.getElementById('signUpBtn');
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
      successMessage.classList.remove('show');
      setTimeout(() => errorMessage.classList.remove('show'), 6000);
    }

    function showSuccess(msg) {
      successMessage.textContent = msg;
      successMessage.classList.add('show');
      errorMessage.classList.remove('show');
      setTimeout(() => {
        successMessage.classList.remove('show');
        window.location.href = 'dashboard.html';
      }, 1500);
    }

    // Email/Password Sign In
    signInBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      signInBtn.disabled = true;
      signInBtn.innerHTML = 'Signing in...';

      try {
        await signIn(email, password);
        showSuccess('Successfully signed in! Redirecting...');
      } catch (err) {
        let errorMsg = 'Failed to sign in. ';
        if (err.code === 'auth/user-not-found') {
          errorMsg += 'No account found with this email.';
        } else if (err.code === 'auth/wrong-password') {
          errorMsg += 'Incorrect password.';
        } else if (err.code === 'auth/invalid-email') {
          errorMsg += 'Invalid email address.';
        } else if (err.code === 'auth/too-many-requests') {
          errorMsg += 'Too many failed attempts. Please try again later.';
        } else {
          errorMsg += err.message;
        }
        showError(errorMsg);
        signInBtn.disabled = false;
        signInBtn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        `;
      }
    });

    // Email/Password Sign Up
    signUpBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      signUpBtn.disabled = true;
      signUpBtn.innerHTML = 'Creating account...';

      try {
        const userCredential = await signUp(email, password);
        await saveUserData(userCredential.user.uid, userCredential.user.email);
        showSuccess('Account created successfully! Redirecting...');
      } catch (err) {
        let errorMsg = 'Failed to create account. ';
        if (err.code === 'auth/email-already-in-use') {
          errorMsg += 'This email is already registered. Please sign in instead.';
        } else if (err.code === 'auth/invalid-email') {
          errorMsg += 'Invalid email address.';
        } else if (err.code === 'auth/weak-password') {
          errorMsg += 'Password is too weak. Use at least 6 characters.';
        } else {
          errorMsg += err.message;
        }
        showError(errorMsg);
        signUpBtn.disabled = false;
        signUpBtn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Create Account
        `;
      }
    });

    // Google Sign In
    googleSignInBtn.addEventListener('click', async () => {
      googleSignInBtn.disabled = true;
      googleSignInBtn.innerHTML = 'Connecting...';

      try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        await saveUserData(user.uid, user.email);
        showSuccess('Successfully signed in with Google! Redirecting...');
      } catch (err) {
        let errorMsg = 'Google sign in failed. ';
        if (err.code === 'auth/popup-closed-by-user') {
          errorMsg = 'Sign in was cancelled.';
        } else if (err.code === 'auth/account-exists-with-different-credential') {
          errorMsg += 'An account already exists with this email. Please use email/password sign in.';
        } else if (err.code === 'auth/popup-blocked') {
          errorMsg += 'Popup was blocked. Please allow popups for this site.';
        } else {
          errorMsg += err.message;
        }
        showError(errorMsg);
        googleSignInBtn.disabled = false;
        googleSignInBtn.innerHTML = `
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        `;
      }
    });

    // Allow Enter key to sign in
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        signInBtn.click();
      }
    });

    emailInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        passwordInput.focus();
      }
    });
  </script>
</body>
</html>
